name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Vérifier la compilation (syntaxe)
        run: |
          python -m compileall -q \
            main.py database.py utils.py create_db.py observability.py rate_limit.py \
            auth bdproduitdz routers

      - name: Audit des dépendances Python (informatif)
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  frontend:
    name: Frontend (Expo / React Native)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Audit npm (informatif)
        continue-on-error: true
        run: npm audit --omit=dev
